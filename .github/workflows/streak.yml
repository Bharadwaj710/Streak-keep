name: Daily Commit

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "$(date)" >> streak.txt

      - name: Commit changes
        run: |
          git config --global user.name "Bharadwaj710"
          git config --global user.email "bharadwaj10flasmvp@gmail.com"
          git add .
          git commit -m "daily streak" || exit 0
          git push